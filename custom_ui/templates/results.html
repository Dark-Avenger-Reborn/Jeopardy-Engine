<html>
<head><title>Scan Results</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
</head>
<body>
<h1>Scan Results</h1>
{% if message %}
<p><strong>{{ message }}</strong></p>
{% endif %}
<h2>Devices</h2>
<table border="1">
<tr><th>IP</th><th>OS</th><th>Status</th></tr>
{% for device in devices %}
<tr><td>{{ device.ip }}</td><td>{{ device.os }}</td><td>{{ device.status }}</td></tr>
{% endfor %}
</table>
<h2>Mass Command</h2>
<form action="/mass_command" method="post">
<label for="cmd">Command:</label><br>
<textarea id="cmd" name="cmd" rows="4" cols="50" placeholder="Enter command to send to all devices"></textarea><br><br>
<label for="os">OS:</label>
<select id="os" name="os">
<option value="linux">Linux</option>
<option value="windows">Windows</option>
</select><br><br>
<input type="submit" value="Send Mass Command">
</form>
<h2>One on One Connection</h2>
<form action="/one_on_one" method="post">
<label for="ip">IP:</label><br>
<input type="text" id="ip" name="ip" placeholder="e.g., 10.1.1.60"><br><br>
<label for="os">OS:</label>
<select id="os" name="os">
<option value="linux">Linux</option>
<option value="windows">Windows</option>
</select><br><br>
<input type="submit" value="Initiate Connection">
</form>
<h2>Shell Interaction</h2>
<div id="terminal" style="width: 100%; height: 400px;"></div>
<a href="/">Back to Scan</a>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const term = new Terminal({cursorBlink: true});
term.open(document.getElementById('terminal'));
term.writeln('Connecting to shell...');

const socket = io();

socket.on('shell_output', (data) => {
    term.write(data.output);
});

term.onData((data) => {
    socket.emit('shell_command', {cmd: data});
});
</script>
</body>
</html>

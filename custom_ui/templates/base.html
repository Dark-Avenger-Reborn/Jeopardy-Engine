<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Signal Deck{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="{{ body_class|default('') }}" data-page="{{ page_name|default('') }}">
    <div class="page-noise" aria-hidden="true"></div>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="/">
                <span class="brand-mark">SD</span>
                <span class="brand-copy">
                    <span class="brand-name">Signal Deck</span>
                    <span class="brand-subtitle">Standalone UI</span>
                </span>
            </a>
            <nav class="topnav">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">Scan</a>
                <a href="/results" class="{% if request.path == '/results' %}active{% endif %}">Results</a>
                <a href="/guide" class="{% if request.path == '/guide' %}active{% endif %}">Guide</a>
            </nav>
        </header>

        <main class="app-main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

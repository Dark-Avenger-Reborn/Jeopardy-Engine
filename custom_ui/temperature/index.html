<html>
<head><title>Jeopardy Engine Scanner</title></head>
<body>
<h1>Network Scanner</h1>
<form action="/scan" method="post">
<label for="linux_range">Linux IP Range:</label><br>
<input type="text" id="linux_range" name="linux_range" value="{{ linux_range }}"><br><br>
<label for="windows_range">Windows IP Range:</label><br>
<input type="text" id="windows_range" name="windows_range" value="{{ windows_range }}"><br><br>
<label for="scanner_ip">Scanner IP:</label><br>
<input type="text" id="scanner_ip" name="scanner_ip" value="{{ private_ip }}"><br><br>
<input type="submit" value="Start Scan">
</form>
</body>
</html>
